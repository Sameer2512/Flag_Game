<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="#6C3AE8"/>

  <!-- Subtle inner glow ring -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4"/>

  <!-- Globe body -->
  <circle cx="96" cy="96" r="58" fill="#1A0533" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Latitude lines -->
  <ellipse cx="96" cy="96" rx="58" ry="22" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <line x1="38" y1="96" x2="154" y2="96" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <line x1="96" y1="38" x2="96" y2="154" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- Longitude curves (simplified) -->
  <ellipse cx="96" cy="96" rx="25" ry="58" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- Continent blobs (stylised) -->
  <!-- Americas shape -->
  <path d="M68 72 Q62 80 65 92 Q70 105 66 114 Q72 110 76 100 Q80 90 78 78 Z"
        fill="#9B72F5" opacity="0.85"/>
  <!-- Europe/Africa shape -->
  <path d="M98 64 Q104 70 106 82 Q108 94 104 108 Q100 116 96 112 Q90 106 92 92 Q94 78 96 66 Z"
        fill="#9B72F5" opacity="0.85"/>
  <!-- Asia shape -->
  <path d="M110 70 Q124 72 130 82 Q132 92 126 100 Q118 106 110 100 Q104 90 108 78 Z"
        fill="#9B72F5" opacity="0.85"/>

  <!-- Flag pole + flag (top-right) -->
  <line x1="118" y1="50" x2="118" y2="28" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <rect x="118" y="28" width="22" height="14" rx="2" fill="#FF6B35"/>
  <rect x="118" y="28" width="22" height="5"  rx="1" fill="#FF6B35"/>
  <rect x="118" y="33" width="22" height="4"  fill="#fff"/>
  <rect x="118" y="37" width="22" height="5"  rx="1" fill="#FF6B35"/>

  <!-- Star sparkles -->
  <circle cx="48"  cy="40"  r="3" fill="#FFD700" opacity="0.9"/>
  <circle cx="148" cy="38"  r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="52"  cy="148" r="2" fill="#FFD700" opacity="0.7"/>
  <circle cx="150" cy="145" r="3" fill="#FFD700" opacity="0.9"/>
  <circle cx="30"  cy="100" r="2" fill="#fff"    opacity="0.5"/>
</svg>
